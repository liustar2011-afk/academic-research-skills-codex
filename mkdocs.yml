      - 支线 B-003 证据表: projects/trusted-data-space-power-transfer/branch-b003-evidence.md
      - 支线 B-003 影响分析: projects/trusted-data-space-power-transfer/branch-b003-implications.md
      - 支线 B-003 汇入建议: projects/trusted-data-space-power-transfer/branch-b003-handoff.md
